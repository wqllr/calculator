<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI助手 | 未来知识库</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #00f0ff;
            --secondary: #7b2ff7;
            --accent: #f72f8b;
            --dark: #0a0a0f;
            --dark-card: #12121a;
            --text: #e0e0e0;
            --text-muted: #888;
        }
        
        body {
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 30% 20%, rgba(123, 47, 247, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0, 240, 255, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            text-decoration: none;
        }
        
        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo span {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }
        
        .nav-links a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.95rem;
            transition: 0.3s;
        }
        
        .nav-links a:hover, .nav-links a.active {
            color: var(--primary);
        }
        
        /* 聊天容器 */
        .chat-wrapper {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 100px auto 0;
            width: calc(100% - 40px);
            padding-bottom: 20px;
        }
        
        .chat-header {
            text-align: center;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .chat-header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .chat-header p {
            color: var(--text-muted);
        }
        
        .chat-container {
            flex: 1;
            background: var(--dark-card);
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 500px;
            max-height: 70vh;
        }
        
        .chat-messages {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
        }
        
        .message {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-avatar {
            width: 45px;
            height: 45px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }
        
        .message-avatar.ai {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }
        
        .message-avatar.user {
            background: rgba(255,255,255,0.1);
        }
        
        .message-content {
            flex: 1;
            max-width: 80%;
        }
        
        .message-role {
            font-size: 0.9rem;
            color: var(--primary);
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .message-text {
            line-height: 1.7;
            color: var(--text);
            word-wrap: break-word;
        }
        
        .message-text code {
            background: rgba(0,240,255,0.1);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            color: var(--primary);
        }
        
        .message-text pre {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 10px 0;
        }
        
        .message-text pre code {
            background: none;
            padding: 0;
        }
        
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 10px 0;
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        
        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
        }
        
        .chat-input-area {
            padding: 20px 25px;
            background: rgba(255,255,255,0.02);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            gap: 15px;
        }
        
        .chat-input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px 20px;
            color: var(--text);
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: 0.3s;
            font-family: inherit;
            min-height: 50px;
            max-height: 120px;
        }
        
        .chat-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0,240,255,0.1);
        }
        
        .chat-input::placeholder {
            color: var(--text-muted);
        }
        
        .send-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 15px;
            padding: 15px 25px;
            color: var(--dark);
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,240,255,0.3);
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .quick-questions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 0 25px 15px;
            justify-content: center;
        }
        
        .quick-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .quick-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(0,240,255,0.05);
        }
        
        /* 功能说明 */
        .features-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px 50px;
            background: rgba(10,10,15,0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: center;
            gap: 30px;
            font-size: 0.85rem;
            color: var(--text-muted);
            z-index: 50;
        }
        
        .features-bar span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        footer {
            text-align: center;
            padding: 15px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        
        @media (max-width: 768px) {
            nav { padding: 15px 20px; }
            .nav-links { display: none; }
            .chat-wrapper { margin-top: 80px; width: calc(100% - 20px); }
            .chat-header h1 { font-size: 1.5rem; }
            .features-bar { padding: 12px 20px; flex-wrap: wrap; gap: 15px; }
            .message-content { max-width: 85%; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    
    <nav>
        <a href="index.html" class="logo">
            <div class="logo-icon">🤖</div>
            <span>未来知识库</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">首页</a></li>
            <li><a href="knowledge.html">知识库</a></li>
            <li><a href="ai.html" class="active">AI助手</a></li>
            <li><a href="tools.html">工具</a></li>
            <li><a href="about.html">关于</a></li>
        </ul>
    </nav>
    
    <div class="chat-wrapper">
        <div class="chat-header">
            <h1>🧠 AI 智能助手</h1>
            <p>随时为您解答问题、提供帮助</p>
        </div>
        
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message">
                    <div class="message-avatar ai">🤖</div>
                    <div class="message-content">
                        <div class="message-role">AI 助手</div>
                        <div class="message-text">
                            你好！我是AI智能助手，基于先进的大语言模型构建。我可以帮助你：
                            <br><br>
                            📚 <strong>知识问答</strong> - 解答各类问题
                            <br>
                            💻 <strong>编程指导</strong> - 代码编写与调试
                            <br>
                            📝 <strong>文案创作</strong> - 文章、方案撰写
                            <br>
                            🌟 <strong>创意建议</strong> - 头脑风暴与规划
                            <br>
                            🧮 <strong>数学计算</strong> - 数学问题求解
                            <br><br>
                            请在下方输入你的问题，我会尽力为你解答！
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="quick-questions">
                <button class="quick-btn" onclick="sendQuestion('帮我写一首关于春天的诗')">帮我写一首诗</button>
                <button class="quick-btn" onclick="sendQuestion('Python如何入门？')">Python入门</button>
                <button class="quick-btn" onclick="sendQuestion('帮我解释什么是机器学习')">什么是机器学习</button>
                <button class="quick-btn" onclick="sendQuestion('给我讲个笑话')">讲个笑话</button>
            </div>
            
            <div class="chat-input-area">
                <textarea class="chat-input" id="userInput" rows="1" placeholder="输入你的问题..."></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <span>发送</span>
                    <span>🚀</span>
                </button>
            </div>
        </div>
    </div>
    
    <div class="features-bar">
        <span>💡 智能对话</span>
        <span>🔒 隐私保护</span>
        <span>⚡ 快速响应</span>
        <span>🌐 多语言支持</span>
    </div>
    
    <script>
        // 本地模拟回复（当API不可用时）
        // const localResponses = {
            '你好': '你好！有什么我可以帮助你的吗？😊',
            'hello': 'Hi there! How can I help you?',
            '帮助': '我可以帮你：解答问题、写代码、写文章、学习辅导等。直接问我吧！',
            '机器学习': '机器学习是人工智能的一个分支，让计算机通过数据学习并改进。主要类型包括：监督学习、无监督学习、强化学习。常见算法有线性回归、决策树、神经网络等。',
            'python': 'Python是一门易学易用的编程语言，适合初学者。建议学习路径：1. 基础语法 2. 数据结构 3. 函数和模块 4. 文件操作 5. 实战项目。推荐资源：菜鸟教程、官方文档、LeetCode。',
            '代码': '我可以帮你写代码！请告诉我：\n1. 使用的编程语言\n2. 实现的功能\n3. 有什么特殊要求吗？',
            '笑话': '有一天，程序员去面试。面试官问："你最大的缺点是什么？"程序员说："我有时候会debug到凌晨。"面试官问："那优点呢？"程序员说："我不需要睡眠。"😄',
            '诗': '好的，我来帮你写一首诗：\n\n春风拂面柳絮飞，\n花开万里映朝晖。\n山川如画天地美，\n人间四月共芳菲。\n\n🌸',
            '春天': '春天到了，万物复苏！\n\n绿意盎然花绽放，\n燕子归来筑巢忙。\n溪水潺潺映蓝天，\n风筝高飞云端上。\n\n🌱',
            '默认': '感谢你的提问！这个问题很有意思。让我来帮你分析一下...\n\n根据我的理解，这个问题涉及多个方面。我建议可以从以下几个角度来思考：\n\n1. 明确具体需求\n2. 了解相关背景\n3. 制定可行计划\n\n如果需要更详细的解答，欢迎继续提问！'
        };
        
        // function getLocalResponse(message) {
            const lowerMsg = message.toLowerCase();
            for (let key in localResponses) {
                if (lowerMsg.includes(key.toLowerCase())) {
                    return localResponses[key];
                }
            }
            return localResponses['默认'];
        }
        
        function addMessage(role, text, isHtml = false) {
            const messages = document.getElementById('chatMessages');
            const isUser = role === 'user';
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.innerHTML = `
                <div class="message-avatar ${role}">${isUser ? '👤' : '🤖'}</div>
                <div class="message-content">
                    <div class="message-role">${isUser ? '你' : 'AI 助手'}</div>
                    <div class="message-text">${isHtml ? text : escapeHtml(text)}</div>
                </div>
            `;
            messages.appendChild(msgDiv);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function escapeHtml(text) {
            return text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        
        // AI API 地址
        const AI_API_URL = 'https://xiaobai-ai-api.loca.lt/api/chat';
        
        async function callAI(message) {
            try {
                const response = await fetch(AI_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: message })
                });
                
                if (!response.ok) {
                    throw new Error('API请求失败');
                }
                
                const data = await response.json();
                return data.response || data.error || '抱歉，我暂时无法回复你。';
                
            } catch (error) {
                console.error('API调用失败:', error);
                // 如果API不可用，使用本地回复作为后备
                return getLocalResponse(message);
            }
        }
        
        // 本地后备回复（当API不可用时）
        function getLocalResponse(message) {
            const responses = {
                '你好': '你好！有什么我可以帮助你的吗？😊',
                'hello': 'Hi there! How can I help you?',
                '帮助': '我可以帮你：解答问题、写代码、写文章、学习辅导等。直接问我吧！',
                '机器学习': '机器学习是人工智能的一个分支，让计算机通过数据学习并改进。主要类型包括：监督学习、无监督学习、强化学习。',
                'python': 'Python是一门易学易用的编程语言，适合初学者。建议学习路径：1. 基础语法 2. 数据结构 3. 函数和模块 4. 实战项目。',
                '代码': '我可以帮你写代码！请告诉我使用的编程语言和实现功能。',
                '笑话': '有一天，程序员去面试。面试官问："你最大的缺点是什么？"程序员说："我有时候会debug到凌晨。"😄',
                '诗': '好的，我来帮你写一首诗：\n\n春风拂面柳絮飞，\n花开万里映朝晖。\n山川如画天地美，\n人间四月共芳菲。\n\n🌸',
            };
            
            const lowerMsg = message.toLowerCase();
            for (let key in responses) {
                if (lowerMsg.includes(key.toLowerCase())) {
                    return responses[key];
                }
            }
            return '感谢你的提问！这个问题很有意思。让我来帮你分析一下...\n\n如果需要更详细的解答，欢迎继续提问！';
        }
        
        function showTyping() {
            const messages = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-avatar ai">🤖</div>
                <div class="message-content">
                    <div class="message-role">AI 助手</div>
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            messages.appendChild(typingDiv);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }
        
        function setInputEnabled(enabled) {
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            input.disabled = !enabled;
            btn.disabled = !enabled;
        }
        
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            
            if (!text) return;
            
            // 显示用户消息
            addMessage('user', text);
            input.value = '';
            
            // 显示加载状态
            showTyping();
            setInputEnabled(false);
            
            try {
                // 调用真正的AI API
                const response = await callAI(text);
                
                // 隐藏加载状态
                hideTyping();
                
                // 显示AI回复
                addMessage('ai', response, true);
                
            } catch (error) {
                hideTyping();
                addMessage('ai', '抱歉，我遇到了一些问题。请稍后再试。😅');
            }
            
            setInputEnabled(true);
            input.focus();
        }
        
        function sendQuestion(question) {
            document.getElementById('userInput').value = question;
            sendMessage();
        }
        
        // 绑定回车发送
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        // 自动调整输入框高度
        document.getElementById('userInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
    </script>
</body>
</html>
