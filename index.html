<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未来知识库 | Future Knowledge Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #00f0ff;
            --secondary: #7b2ff7;
            --accent: #f72f8b;
            --dark: #0a0a0f;
            --text: #e0e0e0;
        }
        
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* 背景效果 */
        .bg-effects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .bg-effects::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(123, 47, 247, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 240, 255, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(247, 47, 139, 0.05) 0%, transparent 70%);
            animation: bgMove 20s ease-in-out infinite;
        }
        
        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-5%, -5%) rotate(5deg); }
        }
        
        /* 网格背景 */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 30s linear infinite;
        }
        
        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }
        
        /* 导航 */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(180deg, rgba(10, 10, 15, 0.9) 0%, transparent 100%);
            backdrop-filter: blur(10px);
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 240, 255, 0.3); }
            50% { box-shadow: 0 0 40px rgba(123, 47, 247, 0.5); }
        }
        
        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }
        
        .nav-links a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.3s;
            position: relative;
        }
        
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.3s;
        }
        
        .nav-links a:hover::after {
            width: 100%;
        }
        
        .nav-links a:hover {
            color: var(--primary);
        }
        
        /* 主内容 */
        main {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px 20px;
            text-align: center;
        }
        
        .hero {
            max-width: 900px;
        }
        
        .badge {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255,);
            border-radius 0.3: 50px;
            font-size: 0.85rem;
            color: var(--primary);
            margin-bottom: 30px;
            animation: fadeInUp 0.8s ease-out;
        }
        
        h1 {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 30px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }
        
        h1 .highlight {
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 1.3rem;
            color: rgba(224, 224, 224, 0.7);
            margin-bottom: 50px;
            line-height: 1.8;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }
        
        .cta-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }
        
        .btn {
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--dark);
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(0, 240, 255, 0.3);
        }
        
        .btn-secondary {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: var(--text);
        }
        
        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        /* 特性卡片 */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 100px;
            max-width: 1200px;
            width: 100%;
        }
        
        .feature-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: left;
            transition: all 0.4s;
            animation: fadeInUp 0.8s ease-out both;
        }
        
        .feature-card:nth-child(1) { animation-delay: 0.8s; }
        .feature-card:nth-child(2) { animation-delay: 1s; }
        .feature-card:nth-child(3) { animation-delay: 1.2s; }
        
        .feature-card:hover {
            transform: translateY(-10px);
            border-color: rgba(0, 240, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }
        
        .feature-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(123, 47, 247, 0.2));
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-bottom: 20px;
        }
        
        .feature-card h3 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: var(--text);
        }
        
        .feature-card p {
            color: rgba(224, 224, 224, 0.6);
            line-height: 1.7;
            font-size: 0.95rem;
        }
        
        /* 页脚 */
        footer {
            position: relative;
            z-index: 1;
            padding: 40px 20px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        footer p {
            color: rgba(224, 224, 224, 0.4);
            font-size: 0.9rem;
        }
        
        footer .heart {
            color: var(--accent);
            animation: heartbeat 1.5s ease-in-out infinite;
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .subtitle { font-size: 1.1rem; }
            nav { padding: 15px 20px; }
            .nav-links { display: none; }
            .cta-buttons { flex-direction: column; }
            .features { grid-template-columns: 1fr; }
        }
        
        /* 浮动AI元素 */
        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .floating {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.5;
            animation: float 15s infinite;
        }
        
        .floating:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
        .floating:nth-child(2) { left: 80%; top: 30%; animation-delay: 2s; }
        .floating:nth-child(3) { left: 30%; top: 70%; animation-delay: 4s; }
        .floating:nth-child(4) { left: 70%; top: 80%; animation-delay: 6s; }
        
        @keyframes float {
            0%, 100% { 
                transform: translateY(0) scale(1);
                opacity: 0.5;
            }
            50% { 
                transform: translateY(-100px) scale(1.5);
                opacity: 0.2;
            }
        }
    </style>
</head>
<body>
    <!-- 背景效果 -->
    <div class="bg-effects">
        <div class="grid-bg"></div>
        <div class="floating-elements">
            <div class="floating"></div>
            <div class="floating"></div>
            <div class="floating"></div>
            <div class="floating"></div>
        </div>
    </div>
    
    <!-- 导航 -->
    <nav>
        <div class="logo">
            <div class="logo-icon">🤖</div>
            <span>未来知识库</span>
        </div>
        <ul class="nav-links">
            <li><a href="#">首页</a></li>
            <li><a href="#">知识库</a></li>
            <li><a href="#">AI助手</a></li>
            <li><a href="#">关于</a></li>
        </ul>
    </nav>
    
    <!-- 主内容 -->
    <main>
        <div class="hero">
            <div class="badge">✨ 探索未来智能时代</div>
            <h1>
                <span class="highlight">AI驱动</span>的<br>
                智能知识库
            </h1>
            <p class="subtitle">
                融合人工智能与前沿科技，为您打造下一代知识管理与智能助手平台。<br>
                让知识流动，让智慧生长，让未来触手可及。
            </p>
            <div class="cta-buttons">
                <a href="#" class="btn btn-primary">开始探索 →</a>
                <a href="#" class="btn btn-secondary">了解更多</a>
            </div>
        </div>
        
        <!-- 特性卡片 -->
        <div class="features">
            <div class="feature-card">
                <div class="feature-icon">🧠</div>
                <h3>AI 智能助手</h3>
                <p>基于先进的大语言模型，理解您的需求，提供精准、个性化的智能问答服务。</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🚀</div>
                <h3>未来科技</h3>
                <p>融合最前沿的AI技术，持续迭代升级，为您带来前所未有的智能体验。</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">💡</div>
                <h3>知识图谱</h3>
                <p>强大的知识管理体系，连接碎片化信息，构建属于您的智能知识网络。</p>
            </div>
        </div>
    </main>
    
    <!-- 页脚 -->
    <footer>
        <p>© 2026 未来知识库 | Powered by <span class="heart">❤️</span> & AI</p>
    </footer>
</body>
</html>
